<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прости меня</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    overflow:hidden;
}

.container{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    max-width:320px;
}

h1{
    font-size:22px;
}

.buttons{
    margin-top:20px;
}

button{
    font-size:18px;
    padding:10px 20px;
    border:none;
    border-radius:12px;
    margin:10px;
    cursor:pointer;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#no{
    background:#ccc;
}

#love{
    display:none;
    font-size:22px;
    color:#ff4d6d;
    margin-top:20px;
}

.heart{
    position:absolute;
    font-size:24px;
    animation:float 3s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-200px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container" id="main">
<h1>извини пожалуйста, знаю что проебался </h1>
<p>и я очень хочу исправить свою вину но так как мы на расстоянии все что я могу сейчас сделать это вот это..<br>

ты простишь меня?</p>

<div class="buttons">
<button id="yes">Да ❤️</button>
<button id="no">Нет</button>
</div>

<div id="love">Спасибо, люблю тебя Алина ❤️</div>
</div>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const love = document.getElementById("love");

noBtn.addEventListener("click",()=>{
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.position="absolute";
    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";
});

yesBtn.addEventListener("click",()=>{
    love.style.display="block";
    createHearts();
});

function createHearts(){
    setInterval(()=>{
        const heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.bottom="0px";
        heart.style.fontSize=(20+Math.random()*30)+"px";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),3000);
    },200);
}

</script>

</body>
</html>
